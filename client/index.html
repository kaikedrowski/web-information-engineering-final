<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>We Bapplication</title>
    <link href="style.css" rel="stylesheet" />
    <script defer src="script.js"></script>
  </head>

  <body>
    <header>
      <div class="logo">Posts</div>
      <button class="menuButton" aria-label="Open menu">⿻</button>
    </header>

    <main class="grid">

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Profile</a></li>
          <li><a href="#">Settings</a></li>
        </ul>
      </nav>

      <section id="feed" class="feed">

      </section>
      <section class="createPost">
        <textarea
            id="postContent"
            placeholder="Draft a post here"
        ></textarea>

        <button id="postButton">
            Post
        </button>
      </section>
    </main>
  </body>
</html>
